services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/storage/uploads

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      - VITE_API_BASE_URL=http://127.0.0.1:8000
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  backend_uploads:
